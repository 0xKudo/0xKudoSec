appId: com.laynekudo.0xkudo

publish:
  provider: github
  owner: 0xKudoX
  repo: 0xKudoSec-releases
productName: 0xKudo Security Toolkit
copyright: Copyright © 2025 Layne Kudo

directories:
  output: ../../../dist-electron
  buildResources: assets

win:
  target:
    - target: nsis
      arch: x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  shortcutName: 0xKudo Security Toolkit
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: installer.nsh

extraResources:
  - from: "assets/fluent-bit-installer.exe"
    to: "assets/fluent-bit-installer.exe"

# Files to include in the package
files:
  - "main.js"
  - "preload.js"
  - "llmWorker.js"
  - "llmProcess.js"
  - "tray.js"
  - "splash.html"
  - "assets/**"
  - "node_modules/**"
  - "package.json"

# Native modules must be unpacked from asar — they cannot run from inside the archive
# llmProcess.js is forked as a child process and must also be outside the asar
asarUnpack:
  - "node_modules/node-llama-cpp/**"
  - "llmProcess.js"
