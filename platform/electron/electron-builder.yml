appId: com.laynekudo.0xkudo

publish:
  provider: github
  owner: 0xKudoX
  repo: 0xKudoSec-releases
productName: 0xKudo Security Toolkit
copyright: Copyright © 2025 Layne Kudo

directories:
  output: ../../../dist-electron
  buildResources: assets

win:
  target:
    - target: nsis
      arch: x64
  icon: assets/icon.ico

compression: maximum

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  shortcutName: 0xKudo Security Toolkit
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: installer.nsh

extraResources:
  - from: "assets/fluent-bit-installer.exe"
    to: "assets/fluent-bit-installer.exe"
  - from: "../../platform/server"
    to: "platform/server"
  - from: "../../platform/shared"
    to: "platform/shared"
  - from: "../../tools"
    to: "tools"
  - from: "../../platform/shell/dist"
    to: "platform/shell/dist"
  - from: "../../node_modules"
    to: "node_modules"

# Files to include in the package
files:
  - "main.js"
  - "preload.js"
  - "llmWorker.js"
  - "llmProcess.js"
  - "tray.js"
  - "splash.html"
  - "assets/**"
  - "node_modules/**"
  - "package.json"
  # Exclude node-llama-cpp build artifacts (cmake files, source, vcxproj) — only binaries needed at runtime
  - "!node_modules/node-llama-cpp/llama/localBuilds/win-x64-cuda/CMakeFiles/**"
  - "!node_modules/node-llama-cpp/llama/localBuilds/win-x64-cuda/llama.cpp/**"
  - "!node_modules/node-llama-cpp/llama/localBuilds/win-x64-cuda/llama-addon.dir/**"
  - "!node_modules/node-llama-cpp/llama/localBuilds/win-x64-cuda/x64/**"
  - "!node_modules/node-llama-cpp/llama/llama.cpp/**"
  - "!node_modules/node-llama-cpp/llama/xpack/**"
  - "!node_modules/node-llama-cpp/llama/toolchains/**"

# Unpack all node_modules — llmProcess.js runs as a child process and needs to resolve
# ESM imports (node-llama-cpp and all its deps) from the filesystem, not inside app.asar
asarUnpack:
  - "node_modules/**"
  - "llmProcess.js"
