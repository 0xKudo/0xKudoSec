appId: com.laynekudo.0xkudo

publish:
  provider: github
  owner: 0xKudoX
  repo: 0xKudoSec-releases
productName: 0xKudo Security Toolkit
copyright: Copyright © 2025 Layne Kudo

directories:
  output: ../../../dist-electron
  buildResources: assets

win:
  target:
    - target: nsis
      arch: x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  shortcutName: 0xKudo Security Toolkit
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Files to include in the package
files:
  - "main.js"
  - "preload.js"
  - "tray.js"
  - "splash.html"
  - "assets/**"
  - "node_modules/**"
  - "package.json"
