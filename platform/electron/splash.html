<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0xKudo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111110;
      color: #e8e6e3;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .brand {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6e6b68;
      margin-bottom: 40px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #2a2928;
      border-top-color: #e8e6e3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: #4a4845;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="brand">0xKudo</div>
  <div class="tagline">Security Toolkit</div>
  <div class="spinner"></div>
  <div class="status">Starting services...</div>
</body>
</html>
