# docs/winlogbeat.yml
# Reference config for Winlogbeat on Windows PC.
# Copy this to C:\Program Files\Elastic\Beats\8.x\winlogbeat\winlogbeat.yml
# Replace YOUR_INGEST_API_KEY with the value from your .env INGEST_API_KEY.

winlogbeat.event_logs:
  - name: Security
    ignore_older: 72h
  - name: System
    ignore_older: 72h
  - name: Application
    ignore_older: 72h
  - name: Microsoft-Windows-Sysmon/Operational
    ignore_older: 72h
  - name: Microsoft-Windows-Windows Firewall With Advanced Security/Firewall
    ignore_older: 72h
  - name: Microsoft-Windows-PowerShell/Operational
    ignore_older: 72h

output.elasticsearch:
  enabled: false

output.http:
  enabled: true
  hosts: ["http://localhost:4000"]
  path: "/api/ingest/beats"
  headers:
    Authorization: "Bearer YOUR_INGEST_API_KEY"
  bulk_max_size: 200
  timeout: 30

logging.level: info
logging.to_files: true
logging.files:
  path: C:\ProgramData\winlogbeat\logs
  name: winlogbeat
  keepfiles: 7
